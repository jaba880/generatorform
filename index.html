<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Конструктор заявок Trinity RP</title>
    <style>
        body { background-color: #0b0c10; color: #c5c6c7; font-family: sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; border: 1px solid #1f2833; padding: 20px; background: #121212; }
        h2 { text-align: center; color: #66fcf1; border-bottom: 1px solid #45a29e; padding-bottom: 10px; }
        .section { margin-bottom: 20px; border: 1px solid #45a29e; padding: 15px; }
        label { display: block; margin-top: 10px; font-weight: bold; color: #45a29e; }
        input, textarea { width: 100%; padding: 8px; background: #1f2833; border: 1px solid #45a29e; color: white; margin-top: 5px; box-sizing: border-box; }
        button { background: #45a29e; color: black; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; margin-top: 20px; width: 100%; }
        #output { background: #000; color: #0f0; padding: 15px; margin-top: 20px; display: none; white-space: pre-wrap; font-family: monospace; border: 1px dashed #45a29e; }
    </style>
</head>
<body>

<div class="container">
    <h2>Программа «Возвращение домой»</h2>
    
    <div class="section">
        <label>1.1. Ваш Nickname:</label>
        <input type="text" id="nick" placeholder="Ivan_Ivanov">

        <label>1.2. Проекты и фракции (где играли):</label>
        <textarea id="exp" rows="3"></textarea>

        <label>1.3. Звание и должность:</label>
        <input type="text" id="rank">
    </div>

    <div class="section">
        <label>2.1. Квента персонажа:</label>
        <textarea id="quenta" rows="4"></textarea>

        <label>2.2. Доказательства игры (ссылки на СС/скриншоты):</label>
        <input type="text" id="proofs">
    </div>

    <button onclick="generate()">СГЕНЕРИРОВАТЬ КОД ДЛЯ ФОРУМА</button>

    <div id="output"></div>
</div>

<script>
function generate() {
    const nick = document.getElementById('nick').value;
    const exp = document.getElementById('exp').value;
    const rank = document.getElementById('rank').value;
    const quenta = document.getElementById('quenta').value;
    const proofs = document.getElementById('proofs').value;

    // Тут настраивается сам BB-код, который пойдет на форум
    const bbCode = `[center][b]ЗАЯВЛЕНИЕ В ПРОГРАММУ BACK HOME[/b][/center]\n` +
                   `[hr]\n` +
                   `[b]Имя Фамилия:[/b] ${nick}\n` +
                   `[b]Где играли ранее:[/b] ${exp}\n` +
                   `[b]Ранг:[/b] ${rank}\n` +
                   `[spoiler=Квента персонажа]${quenta}[/spoiler]\n` +
                   `[b]Доказательства:[/b] ${proofs}`;

    const out = document.getElementById('output');
    out.innerText = bbCode;
    out.style.display = 'block';
    alert("Код готов! Скопируйте его из зеленого окна внизу страницы.");
}
</script>

</body>
</html>
