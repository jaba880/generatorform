<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Backhome LSSD</title>
    <style>
        /* Твои оригинальные стили из GitHub */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: #e0e0e0; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background-color: #2c2c2c; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); width: 100%; max-width: 600px; border-top: 5px solid #d4af37; }
        
        /* Добавленные стили для лого и экстренной кнопки */
        .header-logo { text-align: center; margin-bottom: 20px; }
        .header-logo img { width: 120px; filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3)); }
        .emergency-btn { display: block; text-align: center; background: #8b0000; color: #fff; text-decoration: none; padding: 10px; border-radius: 6px; font-weight: bold; margin-bottom: 25px; border: 1px solid #ff0000; transition: 0.3s; }
        .emergency-btn:hover { background: #ff0000; box-shadow: 0 0 10px rgba(255, 0, 0, 0.5); }

        h1 { text-align: center; color: #d4af37; margin-bottom: 25px; font-size: 24px; text-transform: uppercase; letter-spacing: 1px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #d4af37; }
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #444; border-radius: 6px; background-color: #3d3d3d; color: #fff; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 15px; background-color: #d4af37; border: none; border-radius: 6px; color: #1a1a1a; font-size: 16px; font-weight: bold; cursor: pointer; transition: background-color 0.3s, transform 0.1s; }
        button:hover { background-color: #f1c40f; }
        .result-container { margin-top: 30px; }
        textarea#result { height: 200px; resize: none; background-color: #1a1a1a; border: 1px solid #d4af37; color: #00ff00; font-family: 'Courier New', Courier, monospace; }
    </style>
</head>
<body>

<div class="container">
    <!-- Логотип ЛС -->
    <div class="header-logo">
        <img src="https://upload.wikimedia.org" alt="Seal of Los Santos">
    </div>

    <h1>BackHome LSSD</h1>

    <!-- Кнопка экстренных служб -->
    <a href="https://sd.ls-services.ru" class="emergency-btn">ДЛЯ ЭКСТРЕННЫХ СЛУЖБ</a>

    <form id="backhomeForm">
        <!-- Здесь поля из твоего оригинального кода на GitHub -->
        <label>Имя Фамилия (на англ):</label>
        <input type="text" id="name" placeholder="John Doe" required>
        
        <label>Игровой уровень:</label>
        <input type="number" id="level" placeholder="10" required>

        <label>Ваша история фракций:</label>
        <textarea id="history" placeholder="LSPD (6/10), FBI (3/10)..."></textarea>

        <button type="button" onclick="generateBB()">Сгенерировать код</button>
    </form>

    <div class="result-container">
        <label>Готовый код для форума:</label>
        <textarea id="result" readonly></textarea>
    </div>
</div>

<script>
    function generateBB() {
        const name = document.getElementById('name').value;
        const level = document.getElementById('level').value;
        const history = document.getElementById('history').value;

        // Формируем BB-код (стилистику можешь менять под свой форум)
        const bb = `[CENTER][IMG]https://sd.ls-services.ru[/IMG][/CENTER]\n` +
                   `[B]Имя Фамилия:[/B] ${name}\n` +
                   `[B]Игровой уровень:[/B] ${level}\n` +
                   `[B]История фракций:[/B]\n${history}`;

        document.getElementById('result').value = bb;
    }
</script>

</body>
</html>
