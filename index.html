<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BackHome Program | pd-ls.ru</title>
    <style>
        /* Основные стили */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center; /* Центрирование контента */
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: #252525;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        /* Логотипы и ссылки */
        .emergency-header {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .service-link {
            text-decoration: none;
            color: #fff;
            font-weight: bold;
            font-size: 14px;
            transition: 0.3s;
        }

        .service-link img {
            width: 80px;
            display: block;
            margin: 0 auto 10px;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.2));
        }

        .service-link:hover {
            color: #3498db;
            transform: translateY(-5px);
        }

        h1 { color: #fff; text-transform: uppercase; letter-spacing: 2px; }
        p.subtitle { color: #888; margin-bottom: 40px; }

        /* Форма */
        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #3498db;
        }

        input[type="text"], 
        input[type="url"], 
        textarea, 
        select {
            width: 100%;
            padding: 12px;
            background: #333;
            border: 1px solid #444;
            border-radius: 5px;
            color: #fff;
            box-sizing: border-box;
        }

        textarea { height: 120px; resize: vertical; }

        .btn-submit {
            background: #2980b9;
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .btn-submit:hover { background: #3498db; }

        hr { border: 0; border-top: 1px solid #444; margin: 40px 0; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Блок ссылок экстренных служб -->
        <div class="emergency-header">
            <a href="https://pd-ls.ru" class="service-link">
                <img src="https://upload.wikimedia.org" alt="LSPD">
                LSPD
            </a>
            <a href="#" class="service-link">
                <img src="https://upload.wikimedia.org" alt="LSSD">
                LSSD
            </a>
            <a href="#" class="service-link">
                <img src="https://upload.wikimedia.org" alt="FBI">
                FBI
            </a>
        </div>

        <h1>Программа BackHome</h1>
        <p class="subtitle">Подача заявления на восстановление в департамент pd-ls.ru</p>

        <form id="backhomeForm">
            <!-- Часть I: Личная информация -->
            <h2 style="color: #fff; border-bottom: 1px solid #3498db; display: inline-block;">I. Личные данные</h2>
            
            <div class="form-group">
                <label>Имя и Фамилия (IC):</label>
                <input type="text" placeholder="Напр. John Doe" required>
            </div>

            <div class="form-group">
                <label>Ваш возраст (IC):</label>
                <input type="text" placeholder="Напр. 28">
            </div>

            <div class="form-group">
                <label>Ссылка на ваш профиль VK / Discord:</label>
                <input type="text" placeholder="://vk.com..." required>
            </div>

            <hr>

            <!-- Часть II: Опыт работы -->
            <h2 style="color: #fff; border-bottom: 1px solid #3498db; display: inline-block;">II. Игровой опыт</h2>

            <div class="form-group">
                <label>В каких фракциях состояли ранее? (Укажите проекты и ранги):</label>
                <textarea placeholder="Напр. LSPD (PO III) на Gambit RP, LSSD (SGT) на MyHome..."></textarea>
            </div>

            <div class="form-group">
                <label>Причина ухода из департамента:</label>
                <input type="text" placeholder="ПСЖ / Расформирование / Переезд...">
            </div>

            <div class="form-group">
                <label>Доказательства игры (Скриншоты/Видео/СС):</label>
                <input type="url" placeholder="Imgur / YouTube link">
            </div>

            <hr>

            <!-- Часть III: Дополнительно -->
            <h2 style="color: #fff; border-bottom: 1px solid #3498db; display: inline-block;">III. OOC Информация</h2>

            <div class="form-group">
                <label>Ваш часовой пояс:</label>
                <select>
                    <option>МСК (UTC +3)</option>
                    <option>Киев (UTC +2/3)</option>
                    <option>Другое</option>
                </select>
            </div>

            <div class="form-group">
                <label>Расскажите немного о себе и своих планах во фракции:</label>
                <textarea placeholder="Почему именно вы должны вернуться?"></textarea>
            </div>

            <button type="submit" class="btn-submit">Отправить анкету</button>
        </form>

        <p style="margin-top: 50px; font-size: 12px; color: #555;">
            &copy; 2024 pd-ls.ru. Все права защищены. Разработано для сообщества.
        </p>
    </div>

</body>
</html>
