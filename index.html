<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BackHome Generator | pd-ls.ru</title>
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --accent-blue: #3498db;
            --text-main: #e0e0e0;
            --input-bg: #2a2a2a;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 50px;
        }

        /* Шапка с экстренными службами */
        .emergency-nav {
            width: 100%;
            background: #181818;
            padding: 15px 0;
            border-bottom: 2px solid var(--accent-blue);
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropbtn {
            background: none;
            border: 2px solid var(--accent-blue);
            color: white;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #252525;
            min-width: 250px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.5);
            left: 50%;
            transform: translateX(-50%);
            border-radius: 5px;
            margin-top: 5px;
        }

        .dropdown-content a {
            color: white;
            padding: 12px 16px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #333;
        }

        .dropdown-content a:hover { background-color: #333; }
        .dropdown-content img { width: 30px; height: 30px; }
        .dropdown:hover .dropdown-content { display: block; }

        /* Контейнер формы */
        .main-container {
            max-width: 800px;
            width: 95%;
            margin-top: 40px;
            background: var(--container-bg);
            padding: 40px;
            border-radius: 4px;
            text-align: center;
        }

        h1 { font-size: 28px; letter-spacing: 3px; margin-bottom: 5px; }
        .sub-header { color: #888; font-size: 14px; margin-bottom: 40px; }

        h2 {
            font-size: 20px;
            color: var(--accent-blue);
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-top: 40px;
            text-transform: uppercase;
        }

        .field {
            text-align: left;
            margin-bottom: 20px;
        }

        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 13px; }

        input, textarea, select {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid #444;
            color: white;
            padding: 12px;
            border-radius: 3px;
            box-sizing: border-box;
        }

        .btn-generate {
            background: #27ae60;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            width: 100%;
            transition: 0.3s;
        }

        .btn-generate:hover { background: #2ecc71; }

        /* Окно с результатом */
        #result-area {
            display: none;
            margin-top: 30px;
            background: #000;
            padding: 20px;
            border: 1px dashed var(--accent-blue);
        }
    </style>
</head>
<body>

    <!-- Навигация -->
    <nav class="emergency-nav">
        <div class="dropdown">
            <button class="dropbtn">Для экстренных служб ▼</button>
            <div class="dropdown-content">
                <a href="https://pd-ls.ru/viewforum.php?f=10" target="_blank">
                    <img src="https://pd-ls.ru/styles/lspdAlternative/theme/images/lsCityLogo.png">
                    Los Santos Police Departament
               </a>
                <a href="https://sd.ls-services.ru/viewforum.php?f=4" target="_blank">
                    <img src="https://sd.ls-services.ru/styles/lssdAlternative/theme/images/lsCountyLogo.png">
                    Los Santos County Sheriff
                </a>
                <a href="https://fbi-ls.ru" target="_blank">
                    <img src="https://fbi-ls.ru/images/ranks/FBI_logo.png">
                    Federal Bureau of Investigation
                </a>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <h1>ПРОГРАММА BACKHOME</h1>
        <div class="sub-header">Подача заявления на восстановление в департамент pd-ls.ru</div>

        <form id="bhForm">
            <!-- Блок I -->
            <h2>I. Заявление</h2>
            <div class="field">
                <label>Фракции в которых состояли (Никнейм, проект, должность, причины и даты ухода):</label>
                <input type="text" id="name" placeholder="Заполнить">
            </div>
            <div class="field">
                <label>Доказательства игры (СС, не обязательно за копов):</label>
                <input type="text" id="contact" placeholder="Заполнить">
            </div>
                <div class="field">
                <label>Планируемая роль во фракции:</label>
                <textarea id="exp" placeholder="Описание вашего будущего персонажа, не менее 3-4 предложений."></textarea>
            </div>
            <div class="field">
                <label>Список пожеланий, комментарий::</label>
                <input type="text" id="proof" placeholder="Заполнить">
            </div>
            <!-- Блок II -->
            <h2>II. ООС Информация</h2>
            <div class="field">
                <label>Имя:</label>
                <input type="text" id="name" placeholder="Заполнить">
            </div>
             <div class="field">
                <label>Возвраст:</label>
                <input type="text" id="contact" placeholder="Заполнить">
            </div>
             <div class="field">
                <label>Ссылка на профиль ВК:</label>
                <input type="text" id="contact" placeholder="Заполнить">
            </div>
            <div class="field">
                <label>Скриншот включенного Google Authenticator (без каких-либо обработок):</label>
                <input type="text" id="contact" placeholder="Заполнить>
            </div>

            <!-- Кнопка -->
            <button type="button" class="btn-generate" onclick="generateBB()">СФОРМИРОВАТЬ BB-КОД</button>
        </form>

        <!-- Результат -->
        <div id="result-area">
            <p style="color: #27ae60; font-size: 14px;">Код скопирован в буфер обмена! Теперь просто вставь его на форум.</p>
            <textarea id="bbcode-output" readonly style="height: 150px; font-family: monospace;"></textarea>
        </div>
    </div>

    <script>
        function generateBB() {
            // Собираем данные
            const name = document.getElementById('name').value;
            const contact = document.getElementById('contact').value;
            const exp = document.getElementById('exp').value;
            const proof = document.getElementById('proof').value;

            // Формируем BB-код
            const bb = `[CENTER][IMG]https://pd-ls.rulogo.png[/IMG]\n` +
                       `[B][SIZE=5]ЗАЯВЛЕНИЕ ПО ПРОГРАММЕ BACKHOME[/SIZE][/B][/CENTER]\n\n` +
                       `[B]Имя Фамилия:[/B] ${name}\n` +
                       `[B]Связь с вами:[/B] ${contact}\n` +
                       `[HR][/HR]\n` +
                       `[B]Игровой опыт:[/B]\n${exp}\n\n` +
                       `[B]Доказательства:[/B] [URL]${proof}[/URL]\n` +
                       `[RIGHT][B]Дата:[/B] ${new Date().toLocaleDateString()}\n` +
                       `[B]Подпись:[/B] TEXT[/RIGHT]`;

            // Выводим в поле
            const output = document.getElementById('bbcode-output');
            output.value = bb;
            document.getElementById('result-area').style.display = 'block';

            // Автоматическое копирование
            output.select();
            document.execCommand('copy');
            
            // Скролл вниз к коду
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
