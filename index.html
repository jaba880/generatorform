<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BackHome Generator | pd-ls.ru</title>
    <style>
        :root {
            --bg-color: #0c0c0c;
            --container-bg: #121212;
            --accent-blue: #14243b;
            --bright-blue: #3498db;
            --text-main: #e0e0e0;
            --input-bg: #1a1a1a;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 50px;
        }

        /* 1 & 2. Увеличенная шапка экстренных служб, смещенная вправо */
        .emergency-nav {
            width: 100%;
            background: #181818;
            padding: 25px 50px; /* Увеличено */
            border-bottom: 2px solid var(--bright-blue);
            display: flex;
            justify-content: flex-end; /* Смещено вправо */
            box-sizing: border-box;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .dropbtn {
            background: none;
            border: 2px solid var(--bright-blue);
            color: white;
            padding: 12px 25px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* 3. Увеличенное верхнее окно под логотип, название и девиз */
        .main-header {
            width: 100%;
            max-width: 900px;
            margin: 30px auto 10px auto;
            display: flex;
            align-items: center;
            padding: 20px;
            background: var(--container-bg);
            border: 1px solid #222;
            border-bottom: none;
            box-sizing: border-box;
        }

        .header-logo {
            height: 90px; /* Размер логотипа */
            margin-right: 25px;
        }

        .header-info {
            text-align: left;
        }

        .header-info h1 {
            margin: 0;
            font-size: 26px;
            letter-spacing: 1px;
            color: #fff;
            text-transform: uppercase;
        }

        .header-info p {
            margin: 5px 0 0 0;
            color: var(--bright-blue);
            font-style: italic;
            font-size: 15px;
        }

        /* Контейнер формы */
        .main-container {
            max-width: 900px;
            width: 100%;
            background: var(--container-bg);
            padding: 40px;
            border: 1px solid #222;
            box-sizing: border-box;
        }

        h2 {
            font-size: 18px;
            color: var(--bright-blue);
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-top: 30px;
            text-transform: uppercase;
            text-align: left;
        }

        .field { text-align: left; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 13px; color: #aaa; }

        input, textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid #333;
            color: white;
            padding: 12px;
            border-radius: 3px;
            box-sizing: border-box;
        }

        /* Кнопка отправки */
        .btn-generate {
            background: #27ae60;
            color: white;
            border: none;
            padding: 20px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            text-transform: uppercase;
        }

        /* 4. Исправленное соглашение */
        .agreement-box {
            background: #1a1a1a;
            padding: 20px;
            margin: 30px 0;
            border-left: 4px solid var(--bright-blue);
            text-align: left;
        }

        .agreement-text {
            font-size: 13px;
            color: #888;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <!-- 1 & 2. Шапка вправо и больше -->
    <nav class="emergency-nav">
        <button class="dropbtn">Для экстренных служб ▼</button>
    </nav>

    <!-- 3. Окно с логотипом и девизом -->
    <header class="main-header">
        <img src="https://pd-ls.ru" class="header-logo">
        <div class="header-info">
            <h1>Los Angeles Police Department</h1>
            <p>To Protect and to Serve — Служить и защищать</p>
        </div>
    </header>

    <div class="main-container">
        <form id="bhForm">
            <h2>I. Заявление</h2>
            <div class="field">
                <label>Опыт игры (Проект, должность, даты):</label>
                <input type="text" id="exp" placeholder="Заполнить">
            </div>
            <div class="field">
                <label>Доказательства игры (СС/Скриншоты):</label>
                <input type="text" id="proof" placeholder="Ссылки на imgur/yapx">
            </div>
            <div class="field">
                <label>Ваша роль и пожелания:</label>
                <textarea id="role" rows="4" placeholder="Краткое описание персонажа"></textarea>
            </div>

            <h2>II. ООС Данные</h2>
            <div class="field">
                <label>Ссылка на ВК / Discord:</label>
                <input type="text" id="vk" placeholder="Заполнить">
            </div>

            <!-- 4. Исправленное соглашение -->
            <div class="agreement-box">
                <p class="agreement-text">
                    Я подтверждаю подлинность всех данных и обязуюсь соблюдать внутренний регламент департамента. 
                    Моя подпись ниже означает полное согласие с условиями программы восстановления.
                </p>
            </div>

            <div style="margin-bottom: 20px; text-align: left;">
                <input type="checkbox" id="final_agree" style="transform: scale(1.3); cursor: pointer;">
                <label for="final_agree" style="display: inline; margin-left: 10px; cursor: pointer;">Я принимаю условия соглашения</label>
            </div>

            <!-- 5. Автоматизированная кнопка -->
            <button type="button" class="btn-generate" onclick="submitToForum()">Отправить заявку на форум</button>
        </form>
    </div>

    <script>
        function submitToForum() {
            // Проверка галочки
            if (!document.getElementById('final_agree').checked) {
                alert("Необходимо подтвердить согласие!");
                return;
            }

            // 5. Автоматический сбор данных
            const data = {
                exp: document.getElementById('exp').value,
                proof: document.getElementById('proof').value,
                role: document.getElementById('role').value,
                vk: document.getElementById('vk').value
            };

            // Формируем BB-код
            const bb = `[b]Опыт игры:[/b] ${data.exp}\n[b]Доказательства:[/b] ${data.proof}\n[b]Роль:[/b] ${data.role}\n[b]Связь:[/b] ${data.vk}`;

            // Копируем в буфер
            const el = document.createElement('textarea');
            el.value = bb;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            // Переход на форум
            window.open('https://pd-ls.ru', '_blank');
            alert("Анкета скопирована! Вставьте её (Ctrl+V) в окно сообщения на форуме.");
        }
    </script>
</body>
</html>
